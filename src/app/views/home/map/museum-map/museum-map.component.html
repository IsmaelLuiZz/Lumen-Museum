<section id="contato"></section>
<div class="contato-map-container">
  <!-- Formulário de Contato -->
  <div class="contato">
    <h1>Contato</h1>
    <p>Entre em contato conosco para mais informações.</p>
    <form>
      <label for="name">Nome:</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>

      <label for="message">Mensagem:</label>
      <textarea id="message" name="message" required></textarea>

      <button type="submit">Enviar</button>
    </form>

    <div class="contato-info">
      <h3>Informações de Contato</h3>
      <p>Telefone: (11) 1234-5678</p>
      <p>Celular: (11) 91234-5678</p>
    </div>
  </div>

  <!-- Mapa Estilizado -->
  <div class="map-wrapper">
    <div class="map">
      <div class="location-pin">
        📍
        <span class="tooltip">Lumen Museum</span>
      </div>
    </div>
    <div class="map-footer">
      <h3>Lumen Museum</h3>
      <p>Rua das Luzes, 123 — João Pessoa, JP</p>
      <a href="https://maps.google.com/?q=Lumen+Museum" target="_blank">Abrir no Google Maps</a>
    </div>
  </div>
</div>
